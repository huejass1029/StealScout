<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>StealScout</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080810;color:#dde0f0;font-family:'DM Mono','Courier New',monospace;min-height:100vh}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#080810}::-webkit-scrollbar-thumb{background:#161625}

  /* Header */
  #header{border-bottom:1px solid #161625;padding:16px 20px;display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,#0d0d1c,#080810);position:sticky;top:0;z-index:99}
  #logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:4px;color:#fff}
  #logo span{color:#00ff88}
  .badge{background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.25);color:#00ff88;font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:2px}
  #date-chip{margin-left:auto;font-size:9px;color:#444;letter-spacing:1px;text-align:right;line-height:1.4}
  #refresh-btn{background:none;border:1px solid #1a1a2a;color:#555;padding:6px 12px;border-radius:3px;cursor:pointer;font-size:10px;letter-spacing:1px;font-family:inherit;-webkit-tap-highlight-color:transparent}
  #refresh-btn:active{background:#1a1a2a}

  /* Main */
  #main{padding:20px 16px;max-width:700px;margin:0 auto}

  /* Loader */
  #loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;gap:16px}
  .spinner{width:28px;height:28px;border:2px solid #161625;border-top:2px solid #00ff88;border-radius:50%;animation:spin 0.7s linear infinite}
  #load-text{font-size:10px;color:#333;letter-spacing:2px;animation:pulse 1.4s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* Warning */
  .warn{background:rgba(255,209,102,0.05);border:1px solid rgba(255,209,102,0.2);border-radius:5px;padding:10px 14px;font-size:11px;color:#ffd166;margin-bottom:16px}

  /* Section title */
  .sec-title{font-size:9px;letter-spacing:3px;color:#333;font-weight:700;margin-bottom:12px;text-transform:uppercase}

  /* Alert cards */
  #alerts{margin-bottom:28px}
  .alert-card{border-radius:5px;border:1px solid;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;animation:fadeUp 0.3s ease both;-webkit-tap-highlight-color:transparent}
  .score-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;border:2px solid}
  .alert-info{flex:1;min-width:0}
  .alert-title{font-size:13px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .alert-sub{font-size:10px;color:#777;letter-spacing:0.3px;line-height:1.5}
  .alert-label{font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:2px;border:1px solid;flex-shrink:0;align-self:flex-start}
  .hand-badge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:2px;letter-spacing:1px}
  .rhp{background:rgba(255,100,100,0.1);color:#ff7070}
  .lhp{background:rgba(100,160,255,0.1);color:#6aaeff}

  /* Empty state */
  .empty{padding:32px 16px;text-align:center;color:#2a2a3a;font-size:11px;letter-spacing:1px;background:#0d0d1c;border:1px solid #161625;border-radius:6px}

  /* Cards */
  .card{background:#0d0d1c;border:1px solid #161625;border-radius:7px;overflow:hidden;margin-bottom:20px}
  .card-header{padding:11px 16px;border-bottom:1px solid #131322;font-size:9px;letter-spacing:2px;color:#444;font-weight:700}

  /* Game rows */
  .game-row{padding:12px 16px;border-bottom:1px solid #0f0f1e;display:flex;align-items:center;gap:8px}
  .game-row:last-child{border-bottom:none}
  .game-teams{flex:1}
  .game-matchup{font-size:12px;font-weight:600;margin-bottom:3px}
  .game-pitchers{font-size:10px;color:#444}
  .game-time{font-size:10px;color:#333;text-align:right;flex-shrink:0}

  /* Pitcher rows */
  .pitcher-row{padding:12px 16px;border-bottom:1px solid #0f0f1e;display:flex;align-items:center;gap:10px}
  .pitcher-row:last-child{border-bottom:none}
  .pitcher-rank{font-size:10px;color:#2a2a3a;width:16px;text-align:center;flex-shrink:0}
  .pitcher-info{flex:1;min-width:0}
  .pitcher-name{font-size:12px;font-weight:500;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .pitcher-team{font-size:10px;color:#444}
  .pitcher-score-wrap{text-align:right;flex-shrink:0}
  .pitcher-score{font-size:13px;font-weight:600;margin-bottom:5px}
  .bar{height:2px;border-radius:1px;background:#151525;width:60px;margin-left:auto}
  .bar-fill{height:2px;border-radius:1px}
  .pitcher-stats{font-size:9px;color:#333;margin-top:4px}

  /* Footer */
  #foot{margin-top:20px;font-size:9px;color:#1e1e2e;letter-spacing:1px;text-align:center;padding-bottom:32px}
</style>
</head>
<body>

<div id="header">
  <div id="logo">STEAL<span>SCOUT</span></div>
  <div class="badge">PREGAME</div>
  <div id="date-chip"></div>
  <button id="refresh-btn" onclick="load()">↻ REFRESH</button>
</div>

<div id="main">
  <div id="loader">
    <div class="spinner"></div>
    <div id="load-text">LOADING...</div>
  </div>
  <div id="content" style="display:none">
    <div id="warn-box" style="display:none" class="warn"></div>

    <!-- Alerts -->
    <div class="sec-title">🔥 Pregame Steal Opportunities</div>
    <div id="alerts"></div>

    <!-- Games -->
    <div class="card">
      <div class="card-header">TODAY'S GAMES — PROBABLE PITCHERS</div>
      <div id="games-list"></div>
    </div>

    <!-- Rankings -->
    <div class="card">
      <div class="card-header">PITCHER VULNERABILITY — TODAY'S STARTERS</div>
      <div id="pitcher-list"></div>
    </div>

    <div id="foot">MLB STATS API · FORMULA: SB ALLOWED RATE 35% · CS RATE 30% · RUNNER SB% 25% · HANDEDNESS 10%</div>
  </div>
</div>

<script>
const MLB = "https://statsapi.mlb.com/api/v1";

// ── Score formula ─────────────────────────────────────────────────────────
function calcScore({sbRate, csRate, runnerSBPct, isRHP}) {
  const norm = (v, mn, mx, inv=false) => {
    if (v == null) return 50;
    const c = Math.min(Math.max(v, mn), mx);
    const s = ((c - mn) / (mx - mn)) * 100;
    return inv ? 100 - s : s;
  };
  return Math.round(
    norm(sbRate, 0, 2.5)       * 0.35 +
    norm(csRate, 0, 0.5, true) * 0.30 +
    norm(runnerSBPct, 0.4, 1)  * 0.25 +
    (isRHP == null ? 50 : isRHP ? 80 : 20) * 0.10
  );
}

function scoreStyle(score) {
  if (score >= 75) return {label:"PRIME",   color:"#00ff88", bg:"rgba(0,255,136,0.10)"};
  if (score >= 55) return {label:"FAVORABLE", color:"#ffd166", bg:"rgba(255,209,102,0.10)"};
  return               {label:"NEUTRAL",  color:"#555",    bg:"rgba(255,255,255,0.02)"};
}

// ── API ───────────────────────────────────────────────────────────────────
async function fetchGames() {
  const d = new Date().toISOString().split("T")[0];
  const r = await fetch(`${MLB}/schedule?sportId=1&date=${d}&hydrate=lineups,probablePitcher(note),team`);
  const j = await r.json();
  return j.dates?.[0]?.games || [];
}

async function fetchPitcher(id) {
  try {
    const [sr, br] = await Promise.all([
      fetch(`${MLB}/people/${id}/stats?stats=season&group=pitching&season=2025`),
      fetch(`${MLB}/people/${id}`)
    ]);
    const sd = await sr.json(), bd = await br.json();
    const s = sd.stats?.[0]?.splits?.[0]?.stat;
    const hand = bd.people?.[0]?.pitchHand?.code;
    if (!s) return {hand, isRHP: hand==="R"};
    const sb = parseInt(s.stolenBases||0), cs = parseInt(s.caughtStealing||0);
    const ip = parseFloat(s.inningsPitched||1), tot = sb+cs;
    return {sbAllowed:sb, csForced:cs, ip, sbRate: sb/Math.max(ip/9,1), csRate: tot>0?cs/tot:0, hand, isRHP:hand==="R"};
  } catch { return null; }
}

async function fetchRunner(id) {
  try {
    const r = await fetch(`${MLB}/people/${id}/stats?stats=season&group=hitting&season=2025`);
    const d = await r.json();
    const s = d.stats?.[0]?.splits?.[0]?.stat;
    if (!s) return null;
    const sb = parseInt(s.stolenBases||0), cs = parseInt(s.caughtStealing||0), tot = sb+cs;
    return {sb, cs, sbPct: tot>0?sb/tot:0.5};
  } catch { return null; }
}

// ── Render helpers ────────────────────────────────────────────────────────
function handBadge(hand) {
  if (!hand) return "";
  const cls = hand==="R"?"rhp":"lhp";
  return `<span class="hand-badge ${cls}">${hand}HP</span>`;
}

function setProgress(msg) {
  document.getElementById("load-text").textContent = msg.toUpperCase();
}

function showWarn(msg) {
  const el = document.getElementById("warn-box");
  el.textContent = "⚠ " + msg;
  el.style.display = "block";
}

// ── Main load ─────────────────────────────────────────────────────────────
async function load() {
  document.getElementById("loader").style.display = "flex";
  document.getElementById("content").style.display = "none";
  document.getElementById("warn-box").style.display = "none";
  document.getElementById("alerts").innerHTML = "";
  document.getElementById("games-list").innerHTML = "";
  document.getElementById("pitcher-list").innerHTML = "";

  // Date
  const today = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  document.getElementById("date-chip").innerHTML = today.toUpperCase().replace(", ","<br/>");

  try {
    setProgress("Fetching today's schedule...");
    const rawGames = await fetchGames();

    if (!rawGames.length) {
      renderEmpty("games-list", "No games scheduled today.");
      renderEmpty("alerts", "No games today.");
      finish(); return;
    }

    // Build game list
    const games = rawGames.map(g => ({
      id: g.gamePk,
      away: g.teams?.away?.team?.name || "Away",
      home: g.teams?.home?.team?.name || "Home",
      awayPitcher: g.teams?.away?.probablePitcher?.fullName || null,
      awayPitcherId: g.teams?.away?.probablePitcher?.id || null,
      homePitcher: g.teams?.home?.probablePitcher?.fullName || null,
      homePitcherId: g.teams?.home?.probablePitcher?.id || null,
      time: g.gameDate ? new Date(g.gameDate).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZoneName:"short"}) : "TBD",
      lineup: g.lineups || null,
    }));

    // Render games
    const gamesEl = document.getElementById("games-list");
    if (!games.length) {
      gamesEl.innerHTML = `<div class="empty">No games today</div>`;
    } else {
      gamesEl.innerHTML = games.map(g => `
        <div class="game-row">
          <div class="game-teams">
            <div class="game-matchup">${g.away} <span style="color:#2a2a3a">@</span> ${g.home}</div>
            <div class="game-pitchers">${g.awayPitcher||"TBD"} <span style="color:#222">vs</span> ${g.homePitcher||"TBD"}</div>
          </div>
          <div class="game-time">${g.time}</div>
        </div>`).join("");
    }

    // Collect pitchers
    const pitchers = [];
    for (const g of games) {
      if (g.awayPitcherId) pitchers.push({id:g.awayPitcherId, name:g.awayPitcher, team:g.away});
      if (g.homePitcherId) pitchers.push({id:g.homePitcherId, name:g.homePitcher, team:g.home});
    }

    if (!pitchers.length) {
      showWarn("No probable pitchers announced yet — check back later.");
      renderEmpty("pitcher-list","No starters announced.");
      renderEmpty("alerts","No lineups yet.");
      finish(); return;
    }

    setProgress(`Fetching stats for ${pitchers.length} pitchers...`);
    const ranked = await Promise.all(pitchers.map(async p => {
      const info = await fetchPitcher(p.id);
      const score = info ? calcScore({sbRate:info.sbRate, csRate:info.csRate, runnerSBPct:0.72, isRHP:info.isRHP}) : null;
      return {...p, info, score};
    }));
    ranked.sort((a,b)=>(b.score??0)-(a.score??0));

    // Render pitcher rankings
    const pitcherEl = document.getElementById("pitcher-list");
    if (!ranked.length) {
      pitcherEl.innerHTML = `<div class="empty">No starters found</div>`;
    } else {
      pitcherEl.innerHTML = ranked.map((p,i) => {
        const {color} = scoreStyle(p.score??0);
        return `
        <div class="pitcher-row">
          <div class="pitcher-rank">${i+1}</div>
          <div class="pitcher-info">
            <div class="pitcher-name">${p.name} ${handBadge(p.info?.hand)}</div>
            <div class="pitcher-team">${p.team}</div>
          </div>
          <div class="pitcher-score-wrap">
            <div class="pitcher-score" style="color:${color}">${p.score??'—'}</div>
            <div class="bar"><div class="bar-fill" style="width:${p.score??0}%;background:${color}"></div></div>
            <div class="pitcher-stats">${p.info ? `${p.info.sbAllowed??0} SB · ${Math.round((p.info.csRate??0)*100)}% CS` : 'no data'}</div>
          </div>
        </div>`;
      }).join("");
    }

    // Alerts from lineups
    setProgress("Scanning lineups for steal spots...");
    const alertList = [];

    for (const game of games) {
      if (!game.lineup) continue;
      const matchups = [
        {batters: game.lineup.awayPlayers||[], pitcherId: game.homePitcherId},
        {batters: game.lineup.homePlayers||[], pitcherId: game.awayPitcherId},
      ];
      for (const {batters, pitcherId} of matchups) {
        const pitcher = ranked.find(p=>p.id===pitcherId);
        if (!pitcher?.info) continue;
        for (const batter of batters.slice(0,9)) {
          const runner = await fetchRunner(batter.id);
          if (!runner || runner.sb < 3) continue;
          const score = calcScore({sbRate:pitcher.info.sbRate, csRate:pitcher.info.csRate, runnerSBPct:runner.sbPct, isRHP:pitcher.info.isRHP});
          if (score >= 55) {
            alertList.push({
              runner: batter.fullName, runnerSB: runner.sb, runnerSBPct: runner.sbPct,
              pitcher: pitcher.name, pitcherHand: pitcher.info.hand,
              pitcherSBAllowed: pitcher.info.sbAllowed, pitcherCSRate: pitcher.info.csRate,
              score
            });
          }
        }
      }
    }

    alertList.sort((a,b)=>b.score-a.score);

    const alertsEl = document.getElementById("alerts");
    if (!alertList.length) {
      alertsEl.innerHTML = `<div class="empty">${games.length===0?"No games today.":"Lineups not yet posted — check back ~90 min before first pitch."}</div>`;
    } else {
      alertsEl.innerHTML = alertList.map((a,i) => {
        const {label,color,bg} = scoreStyle(a.score);
        return `
        <div class="alert-card" style="border-color:${color}2a;background:${bg};animation-delay:${i*0.05}s">
          <div class="score-circle" style="border-color:${color};color:${color}">${a.score}</div>
          <div class="alert-info">
            <div class="alert-title">${a.runner} <span style="color:#333;font-weight:400">vs</span> ${a.pitcher} ${handBadge(a.pitcherHand)}</div>
            <div class="alert-sub">
              Runner: ${a.runnerSB} SB · ${Math.round(a.runnerSBPct*100)}% success<br/>
              Pitcher: ${a.pitcherSBAllowed??'—'} allowed · ${Math.round((a.pitcherCSRate??0)*100)}% CS rate
            </div>
          </div>
          <div class="alert-label" style="border-color:${color}55;color:${color}">${label}</div>
        </div>`;
      }).join("");
    }

  } catch(e) {
    showWarn("Error loading data: " + e.message);
  }

  finish();
}

function renderEmpty(id, msg) {
  document.getElementById(id).innerHTML = `<div class="empty">${msg}</div>`;
}

function finish() {
  document.getElementById("loader").style.display = "none";
  document.getElementById("content").style.display = "block";
}

load();
</script>
</body>
</html>
